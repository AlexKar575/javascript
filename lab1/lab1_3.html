<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод числа</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        a {
            display: inline-block;
            margin-top: 50px;
            padding: 10px 20px;
            background-color:#6c9be2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        a:hover {
            background-color: #5297ac;
        }
    </style>
</head>
<body>
    <h1>Страница "Ввод числа"</h1>
    <p>Нажмите на ссылку ниже, чтобы перейти на главную страницу</p>
    
    <a href="https://alexkar575.github.io/javascript/" id="numberLink">Получить число</a>

    <script>
        "use strict";

        // Функция ввода и проверки числа с циклом внутри
        function checkNumber() {
            while (true) {
                let number = prompt("Пожалуйста, введите число больше 100:", "");
                
                // 1. Если нажат Cancel или ESC -> цикл прерывается, возвращаем false
                if (number === null) {
                    return false;
                }
                
                // 2. Если введено верное число > 100 -> цикл прерывается, возвращаем true
                if (number.trim() !== "" && !isNaN(number) && Number(number) > 100) {
                    return true;
                }
                
                // 3. Если число <= 100 или введены буквы -> цикл продолжается снова
                alert("Нужно ввести число больше 100!");
            }
        }

        // Обработчик клика по гиперссылке
        document.getElementById('numberLink').addEventListener('click', function(event) {
            event.preventDefault(); // Отменяем стандартный переход
            
            let link = this.href;
            
            // Запускаем функцию проверки
            if (checkNumber()) {
                // Если функция вернула true (ввели > 100) — переходим
                window.location.href = link;
            } else {
                // Если функция вернула false (нажали Cancel) — спрашиваем разрешение
                if (confirm("Вы отменили ввод. Хотите продолжить переход на главную страницу?")) {
                    window.location.href = link;
                }
            }
        });
    </script>
</body>
</html>
