<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод числа</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        a {
            display: inline-block;
            margin-top: 50px;
            padding: 10px 20px;
            background-color:#6c9be2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        a:hover {
            background-color: #5297ac;
        }
    </style>
</head>
<body>
    <h1>Страница "Ввод числа"</h1>
    <p>Нажмите на ссылку ниже, чтобы перейти на главную страницу</p>
    
    <a href="https://alexkar575.github.io/javascript/" id="numberLink">Получить число</a>

      <script>
        "use strict";

        // Функция ввода и проверки числа, возвращающая true или false
        function checkNumber() {
            let number = prompt("Пожалуйста, введите число больше 100:", "");
            
            // Если нажат Cancel (ESC)
            if (number === null) {
                return false;
            }
            
            // Если введено верное число > 100, возвращаем true
            if (number.trim() !== "" && !isNaN(number) && Number(number) > 100) {
                return true;
            }
            
            // Во всех остальных случаях (число <= 100 или буквы) возвращаем false
            return false;
        }

        // Обработчик клика по гиперссылке
        document.getElementById('numberLink').addEventListener('click', function(event) {
            event.preventDefault(); // Отменяем стандартный переход
            
            let link = this.href;
            
            // Если функция вернула true — сразу переходим
            if (checkNumber()) {
                window.location.href = link;
            } else {
                // Если false (нажали Cancel ИЛИ ввели число меньше 100) — спрашиваем разрешение
                if (confirm("Вы не ввели нужное число. Хотите продолжить переход?")) {
                    window.location.href = link;
                }
            }
        });
    </script>

</body>
</html>
